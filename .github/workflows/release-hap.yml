name: Release HAP (stable)

on:
  push:
    tags:
      - 'v*'

env:
  CLT_BASE_URL: https://github.com/jerry-271828/harmonyos-commandline-tools/releases/download/v26.0.0.461
  CLT_SHA256: b046da0a1a06fe13b3d82d198738abc54788d79c6c9d07c36617ec7fc31a3b3b

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download HarmonyOS command-line-tools
        run: |
          cd "$RUNNER_TEMP"
          curl -fsSL --retry 3 -O "$CLT_BASE_URL/clt.zip.part00" -O "$CLT_BASE_URL/clt.zip.part01"
          cat clt.zip.part00 clt.zip.part01 > clt.zip
          rm -f clt.zip.part00 clt.zip.part01
          echo "$CLT_SHA256  clt.zip" | sha256sum -c
          unzip -q clt.zip -d "$HOME"
          rm -f clt.zip

      - name: Set up build environment
        run: |
          CLT="$HOME/command-line-tools"
          echo "$CLT/bin" >> "$GITHUB_PATH"
          echo "$CLT/tool/node/bin" >> "$GITHUB_PATH"
          echo "DEVECO_SDK_HOME=$CLT/sdk" >> "$GITHUB_ENV"

      - name: ohpm install
        working-directory: harmony
        run: |
          ohpm config set registry https://ohpm.openharmony.cn/ohpm/
          ohpm install --all

      - name: Generate build-profile.json5 for CI
        working-directory: harmony
        run: |
          cat > build-profile.json5 << 'EOF'
          {
            "app": {
              "signingConfigs": [],
              "products": [
                {
                  "name": "default",
                  "signingConfig": "default",
                  "compileSdkVersion": "26.0.0(26.0.0)",
                  "compatibleSdkVersion": "6.1.0(23)",
                  "targetSdkVersion": "26.0.0(26.0.0)",
                  "runtimeOS": "HarmonyOS"
                }
              ],
              "buildModeSet": [
                { "name": "debug" },
                { "name": "release" }
              ]
            },
            "modules": [
              {
                "name": "entry",
                "srcPath": "./entry",
                "targets": [
                  { "name": "default", "applyToProducts": ["default"] }
                ]
              }
            ]
          }
          EOF
          grep SdkVersion build-profile.json5

      - name: Build HAP (release, unsigned)
        working-directory: harmony
        run: hvigorw --mode module -p product=default -p buildMode=release assembleHap --no-daemon

      - name: Locate artifacts
        run: find harmony/entry/build -name '*.hap' -print

      - uses: actions/upload-artifact@v4
        with:
          name: betterxny-hap
          path: harmony/entry/build/default/outputs/**/*.hap
          if-no-files-found: error

      - name: Publish stable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          haps=(harmony/entry/build/default/outputs/**/*.hap)
          if [ ${#haps[@]} -eq 0 ]; then echo "no .hap found"; exit 1; fi

          tag="${GITHUB_REF#refs/tags/}"
          ver=$(grep -oP '"versionName"\s*:\s*"\K[^"]+' harmony/AppScope/app.json5)

          assets=()
          for h in "${haps[@]}"; do
            dst="$RUNNER_TEMP/$(basename "$h" .hap)-${ver}.hap"
            cp "$h" "$dst"
            assets+=("$dst")
          done

          gh release create "$tag" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "${tag} · 爆改新能源 HarmonyOS 原生版 ${ver}" \
            --latest \
            --notes "正式版 **${tag}**（versionName ${ver}）。

⚠️ 未签名 HAP，装机需本地签名或在 DevEco Studio 中重新签名后安装。"
